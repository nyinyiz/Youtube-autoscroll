<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 240px; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        h3 { margin-top: 0; font-size: 16px; color: #cc0000; }
        .row { margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .slider-control { margin-bottom: 14px; }
        .slider-control .row { margin-bottom: 4px; }
        input[type="range"] { width: 100%; }
        span { font-size: 14px; }
        .val { font-weight: bold; }
        hr { border: none; border-top: 1px solid #eee; margin: 12px 0; }
    </style>
</head>
<body>
    <h3>YouTube Auto-Scroll</h3>

    <div class="row">
        <span>Active</span>
        <input type="checkbox" id="active">
    </div>
    <div class="row">
        <span>Auto-enable on Shorts</span>
        <input type="checkbox" id="autoEnable">
    </div>

    <hr>

    <div class="slider-control">
        <div class="row">
            <span>Delay before next video</span>
            <span class="val"><span id="delayVal">0.0</span>s</span>
        </div>
        <input type="range" id="delay" min="0" max="5" step="0.5" value="0">
    </div>

    <div class="slider-control">
        <div class="row">
            <span>Trigger seconds early</span>
            <span class="val"><span id="thresholdVal">0.5</span>s</span>
        </div>
        <input type="range" id="threshold" min="0.1" max="3" step="0.1" value="0.5">
    </div>

    <script src="popup.js"></script>
</body>
</html>
